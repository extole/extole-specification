name: Sync from extole/openapi

on:
  repository_dispatch:
    types: [sync-from-openapi]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PLURIBUS_BRANCH: ${{ github.event.client_payload.pluribus_branch || 'master' }}
      PLURIBUS_SHA: ${{ github.event.client_payload.pluribus_sha || '' }}
      OPENAPI_SHA: ${{ github.event.client_payload.openapi_sha || '' }}

    steps:
      - name: Checkout extole-specification
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.EXTOLE_GITHUB_PAT }}
          fetch-depth: 0

      - name: Clone extole/openapi
        run: |
          git clone --depth 1 --branch main \
            "https://x-access-token:${{ secrets.EXTOLE_GITHUB_PAT }}@github.com/extole/openapi.git" openapi-upstream

      - name: Copy specs
        run: |
          expected_specs=(
            management
            management-expert
            integration-server-to-extole
            integration-consumer-to-extole
          )
          for name in "${expected_specs[@]}"; do
            src="openapi-upstream/specs/${name}.json"
            dest="openapi/${name}.json"
            if [ ! -f "$src" ]; then
              echo "::error::upstream spec $src is missing"
              exit 1
            fi
            cp "$src" "$dest"
          done

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version-file: .nvmrc

      - name: Install dependencies and build
        run: |
          npm ci --prefer-offline
          npm run build

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.EXTOLE_GITHUB_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="sync/openapi-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git add openapi/ postman/

          if git diff --staged --quiet; then
            echo "No spec changes, skipping PR"
            exit 0
          fi

          MSG="feat: sync specs from extole/openapi"
          if [ -n "${PLURIBUS_SHA}" ]; then
            MSG="${MSG} (pluribus ${PLURIBUS_BRANCH} @ ${PLURIBUS_SHA:0:7})"
          fi
          if [ -n "${OPENAPI_SHA}" ]; then
            MSG="${MSG} (openapi @ ${OPENAPI_SHA:0:7})"
          fi

          git commit -m "${MSG}"
          git push origin "$BRANCH"

          gh pr create \
            --title "${MSG}" \
            --body "Automated sync from [extole/openapi](https://github.com/extole/openapi).

          - pluribus branch: \`${PLURIBUS_BRANCH}\`
          - pluribus sha: \`${PLURIBUS_SHA:-unknown}\`
          - openapi sha: \`${OPENAPI_SHA:-unknown}\`" \
            --base main \
            --head "$BRANCH"
